version: "3.9"

services:
  backend:
    build: ./backend
    restart: always
    ports: 
      - "5000:5000"
    depends_on:
      - db
      - redis
    environment: 
      - DB_HOST=db
      - REDIS_HOST=redis  
  frontend: 
    build: ./frontend
    restart: always
    ports: 
      - "3000:3000"
    depends_on:
      - backend
  db:
    image: postgres:15
    restart: always
    environment: 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pocdb
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"