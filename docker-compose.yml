version: "3.9"

services:
  nginx:
    image: nginx:latest
    ports: 
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    ports: 
      - "5000:5000"
    depends_on:
      - db
      - redis
    environment: 
      - DB_HOST=db
      - REDIS_HOST=redis  
  frontend: 
    build: ./frontend
    ports: 
      - "3000:3000"
    depends_on:
      - backend
  db:
    image: postgres:15
    restart: always
    environment: 
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pocdb
    ports:
      - "5432:5432"
  redis:
    image: redis:7
    ports:
      - "6379:6379"